<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>InnovaTech SARL - Connexion</title>
    <link rel="stylesheet" href="global-design-v2.css">
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
    <style>
        .auth-container {
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 20px;
            margin-top: 0;
        }
        
        .auth-card {
            width: 100%;
            max-width: 450px;
            background: rgba(30, 41, 59, 0.6);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 20px;
            padding: 50px 40px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.4);
        }
        
        .auth-header {
            text-align: center;
            margin-bottom: 40px;
        }
        
        .auth-logo {
            display: flex;
            justify-content: center;
            margin-bottom: 25px;
        }
        
        .auth-logo img {
            height: 60px;
            border-radius: 10px;
        }
        
        .auth-title {
            font-size: 28px;
            font-weight: 700;
            margin-bottom: 8px;
            background: linear-gradient(135deg, var(--accent), var(--primary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        
        .auth-subtitle {
            color: var(--text-muted);
            font-size: 14px;
        }
        
        .form-wrapper {
            margin-bottom: 30px;
        }
        
        .form-group input {
            width: 100%;
        }
        
        .password-toggle {
            position: absolute;
            right: 12px;
            top: 50%;
            transform: translateY(-50%);
            background: none;
            border: none;
            color: var(--text-muted);
            cursor: pointer;
            padding: 8px;
        }
        
        .password-toggle:hover {
            color: var(--accent);
        }
        
        .checkbox-group {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 30px;
            gap: 20px;
        }
        
        .checkbox-group label {
            display: flex;
            align-items: center;
            gap: 8px;
            cursor: pointer;
            font-size: 14px;
            color: var(--text-muted);
            margin: 0;
        }
        
        .checkbox-group a {
            font-size: 14px;
            color: var(--primary);
        }
        
        .checkbox-group a:hover {
            color: var(--accent);
        }
        
        .btn-login {
            width: 100%;
            padding: 14px;
            margin-bottom: 20px;
        }
        
        .divider {
            display: flex;
            align-items: center;
            gap: 15px;
            margin: 30px 0;
        }
        
        .divider::before,
        .divider::after {
            content: '';
            flex: 1;
            height: 1px;
            background: rgba(255, 255, 255, 0.1);
        }
        
        .divider-text {
            color: var(--text-muted);
            font-size: 14px;
            font-weight: 500;
        }
        
        .auth-footer {
            text-align: center;
            padding-top: 30px;
        }
        
        .auth-footer p {
            margin: 0;
            color: var(--text-muted);
            font-size: 14px;
        }
        
        .auth-footer a {
            font-weight: 600;
            color: var(--primary);
        }
        
        .auth-footer a:hover {
            color: var(--accent);
        }
        
        .alert {
            margin-bottom: 20px;
            display: none;
        }
        
        .alert.show {
            display: flex;
        }
        
        .loading {
            display: none;
            align-items: center;
            justify-content: center;
            gap: 10px;
            text-align: center;
        }
        
        .spinner {
            border: 3px solid rgba(255, 255, 255, 0.1);
            border-top-color: var(--primary);
            border-radius: 50%;
            width: 20px;
            height: 20px;
            animation: spin 1s linear infinite;
        }
        
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        
        @media (max-width: 600px) {
            .auth-card {
                padding: 35px 25px;
            }
            
            .auth-title {
                font-size: 24px;
            }
            
            .checkbox-group {
                flex-direction: column;
                align-items: flex-start;
            }
        }
    </style>
</head>
<body>

<div class="auth-container">
    <div class="auth-card">
        <div class="auth-header">
            <div class="auth-logo">
                <a href="index.html">
                    <img src="log1.jpeg" alt="InnovaTech">
                </a>
            </div>
            <h1 class="auth-title">Connexion</h1>
            <p class="auth-subtitle">Accédez à votre espace personnel</p>
        </div>
        
        <div class="alert alert-success" id="successAlert">
            <span class="material-icons">check_circle</span>
            <span>Connexion réussie ! Redirection...</span>
        </div>
        
        <div class="alert alert-error" id="errorAlert">
            <span class="material-icons">error</span>
            <span id="errorMessage">Erreur d'authentification</span>
        </div>
        
        <form id="loginForm" class="form-wrapper">
            <div class="form-group">
                <label for="email">Adresse Email</label>
                <input type="email" id="email" class="form-control" placeholder="votre@email.com" required>
            </div>
            
            <div class="form-group">
                <label for="password">Mot de passe</label>
                <div style="position: relative;">
                    <input type="password" id="password" class="form-control" placeholder="••••••••" required>
                    <button type="button" class="password-toggle" id="passwordToggle">
                        <span class="material-icons">visibility</span>
                    </button>
                </div>
            </div>
            
            <div class="checkbox-group">
                <label>
                    <input type="checkbox" id="rememberMe">
                    Se souvenir de moi
                </label>
                <a href="#">Mot de passe oublié ?</a>
            </div>
            
            <button type="submit" class="btn-primary btn-login" id="loginBtn">
                <span class="material-icons">login</span>
                Se Connecter
            </button>
            
            <div class="loading" id="loading">
                <div class="spinner"></div>
                <span>Connexion en cours...</span>
            </div>
        </form>
        
        <div class="divider">
            <span class="divider-text">ou</span>
        </div>
        
        <div class="auth-footer">
            <p>Pas encore de compte ? <a href="register.html">S'inscrire</a></p>
        </div>
    </div>
</div>

<script>
// Initialize users in localStorage
const defaultUsers = [
    {
        id: 1,
        email: 'admin@innovatech.com',
        password: 'admin123',
        nom: 'Administrateur',
        role: 'admin',
        telephone: '0123456789',
        formation: 'dev-web',
        createdAt: new Date().toISOString()
    },
    {
        id: 2,
        email: 'user@innovatech.com',
        password: 'user123',
        nom: 'Utilisateur Test',
        role: 'user',
        telephone: '0123456789',
        formation: 'dev-web',
        createdAt: new Date().toISOString()
    }
];

if (!localStorage.getItem('innovatech_users')) {
    localStorage.setItem('innovatech_users', JSON.stringify(defaultUsers));
}

let users = JSON.parse(localStorage.getItem('innovatech_users'));

const loginForm = document.getElementById('loginForm');
const loginBtn = document.getElementById('loginBtn');
const loading = document.getElementById('loading');
const successAlert = document.getElementById('successAlert');
const errorAlert = document.getElementById('errorAlert');
const errorMessage = document.getElementById('errorMessage');
const passwordInput = document.getElementById('password');
const passwordToggle = document.getElementById('passwordToggle');

// Password visibility toggle
passwordToggle.addEventListener('click', () => {
    const type = passwordInput.type === 'password' ? 'text' : 'password';
    passwordInput.type = type;
    passwordToggle.innerHTML = type === 'password' ? 
        '<span class="material-icons">visibility</span>' : 
        '<span class="material-icons">visibility_off</span>';
});

loginForm.addEventListener('submit', async function(e) {
    e.preventDefault();
    
    const email = document.getElementById('email').value.trim();
    const password = document.getElementById('password').value;
    
    if (!email || !password) {
        showError('Veuillez remplir tous les champs');
        return;
    }
    
    loginBtn.style.display = 'none';
    loading.style.display = 'flex';
    hideAlerts();
    
    await new Promise(resolve => setTimeout(resolve, 1500));
    
    const user = users.find(u => u.email === email && u.password === password);
    
    if (user) {
        const session = {
            user: {
                id: user.id,
                email: user.email,
                nom: user.nom,
                role: user.role
            },
            loginAt: new Date().toISOString()
        };
        
        localStorage.setItem('innovatech_session', JSON.stringify(session));
        showSuccess();
        
        setTimeout(() => {
            if (user.role === 'admin') {
                window.location.href = 'admin-dashboard.html';
            } else {
                window.location.href = 'user-dashboard.html';
            }
        }, 2000);
    } else {
        showError('Email ou mot de passe incorrect');
        loginBtn.style.display = 'inline-flex';
        loading.style.display = 'none';
    }
});

function showSuccess() {
    successAlert.classList.add('show');
    errorAlert.classList.remove('show');
}

function showError(message) {
    errorMessage.textContent = message;
    errorAlert.classList.add('show');
    successAlert.classList.remove('show');
}

function hideAlerts() {
    successAlert.classList.remove('show');
    errorAlert.classList.remove('show');
}

// Check if already logged in
window.addEventListener('load', function() {
    const session = JSON.parse(localStorage.getItem('innovatech_session'));
    if (session && session.user) {
        if (session.user.role === 'admin') {
            window.location.href = 'admin-dashboard.html';
        } else {
            window.location.href = 'user-dashboard.html';
        }
    }
});
</script>

</body>
</html>
