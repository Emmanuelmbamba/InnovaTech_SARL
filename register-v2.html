<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>InnovaTech SARL - Inscription</title>
    <link rel="stylesheet" href="global-design-v2.css">
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
    <style>
        .auth-container {
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 20px;
            margin-top: 0;
        }
        
        .auth-card {
            width: 100%;
            max-width: 550px;
            background: rgba(30, 41, 59, 0.6);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 20px;
            padding: 50px 40px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.4);
        }
        
        .auth-header {
            text-align: center;
            margin-bottom: 40px;
        }
        
        .auth-logo {
            display: flex;
            justify-content: center;
            margin-bottom: 25px;
        }
        
        .auth-logo img {
            height: 60px;
            border-radius: 10px;
        }
        
        .auth-title {
            font-size: 28px;
            font-weight: 700;
            margin-bottom: 8px;
            background: linear-gradient(135deg, var(--accent), var(--primary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        
        .auth-subtitle {
            color: var(--text-muted);
            font-size: 14px;
        }
        
        .form-wrapper {
            margin-bottom: 30px;
        }
        
        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
        }
        
        .form-group input,
        .form-group select {
            width: 100%;
        }
        
        .form-group.full {
            grid-column: 1 / -1;
        }
        
        .checkbox-terms {
            display: flex;
            align-items: flex-start;
            gap: 10px;
            margin-bottom: 25px;
            font-size: 13px;
        }
        
        .checkbox-terms input {
            margin-top: 4px;
            cursor: pointer;
        }
        
        .checkbox-terms label {
            margin: 0;
            cursor: pointer;
        }
        
        .checkbox-terms a {
            color: var(--primary);
        }
        
        .btn-register {
            width: 100%;
            padding: 14px;
            margin-bottom: 20px;
        }
        
        .divider {
            display: flex;
            align-items: center;
            gap: 15px;
            margin: 30px 0;
        }
        
        .divider::before,
        .divider::after {
            content: '';
            flex: 1;
            height: 1px;
            background: rgba(255, 255, 255, 0.1);
        }
        
        .divider-text {
            color: var(--text-muted);
            font-size: 14px;
            font-weight: 500;
        }
        
        .auth-footer {
            text-align: center;
            padding-top: 30px;
        }
        
        .auth-footer p {
            margin: 0;
            color: var(--text-muted);
            font-size: 14px;
        }
        
        .auth-footer a {
            font-weight: 600;
            color: var(--primary);
        }
        
        .auth-footer a:hover {
            color: var(--accent);
        }
        
        .alert {
            margin-bottom: 20px;
            display: none;
        }
        
        .alert.show {
            display: flex;
        }
        
        .loading {
            display: none;
            align-items: center;
            justify-content: center;
            gap: 10px;
            text-align: center;
        }
        
        .spinner {
            border: 3px solid rgba(255, 255, 255, 0.1);
            border-top-color: var(--primary);
            border-radius: 50%;
            width: 20px;
            height: 20px;
            animation: spin 1s linear infinite;
        }
        
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        
        @media (max-width: 600px) {
            .auth-card {
                padding: 35px 25px;
            }
            
            .auth-title {
                font-size: 24px;
            }
            
            .form-row {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>

<div class="auth-container">
    <div class="auth-card">
        <div class="auth-header">
            <div class="auth-logo">
                <a href="index.html">
                    <img src="log1.jpeg" alt="InnovaTech">
                </a>
            </div>
            <h1 class="auth-title">Créer un compte</h1>
            <p class="auth-subtitle">Rejoignez InnovaTech SARL</p>
        </div>
        
        <div class="alert alert-success" id="successAlert">
            <span class="material-icons">check_circle</span>
            <span>Compte créé avec succès ! Redirection...</span>
        </div>
        
        <div class="alert alert-error" id="errorAlert">
            <span class="material-icons">error</span>
            <span id="errorMessage">Erreur lors de l'inscription</span>
        </div>
        
        <form id="registerForm" class="form-wrapper">
            <div class="form-row">
                <div class="form-group">
                    <label for="prenom">Prénom</label>
                    <input type="text" id="prenom" class="form-control" placeholder="Jean" required>
                </div>
                
                <div class="form-group">
                    <label for="nom">Nom</label>
                    <input type="text" id="nom" class="form-control" placeholder="Dupont" required>
                </div>
            </div>
            
            <div class="form-group">
                <label for="email">Adresse Email</label>
                <input type="email" id="email" class="form-control" placeholder="votre@email.com" required>
            </div>
            
            <div class="form-group">
                <label for="telephone">Téléphone</label>
                <input type="tel" id="telephone" class="form-control" placeholder="+33 6 00 00 00 00" required>
            </div>
            
            <div class="form-group">
                <label for="formation">Formation souhaitée</label>
                <select id="formation" class="form-control" required>
                    <option value="">-- Sélectionnez une formation --</option>
                    <option value="dev-web">Développement Web & Applications</option>
                    <option value="admin-reseau">Administration Réseau & Télécom</option>
                    <option value="gestion-entreprises">Gestion des Entreprises Publiques</option>
                    <option value="base-donnees">Base de Données</option>
                    <option value="cybersecurite">Cybersécurité</option>
                    <option value="maintenance">Maintenance Informatique</option>
                </select>
            </div>
            
            <div class="form-row">
                <div class="form-group">
                    <label for="password">Mot de passe</label>
                    <input type="password" id="password" class="form-control" placeholder="••••••••" required>
                    <small style="color: var(--text-muted); margin-top: 5px; display: block;">Min. 8 caractères</small>
                </div>
                
                <div class="form-group">
                    <label for="confirmPassword">Confirmer le mot de passe</label>
                    <input type="password" id="confirmPassword" class="form-control" placeholder="••••••••" required>
                </div>
            </div>
            
            <div class="checkbox-terms">
                <input type="checkbox" id="terms" required>
                <label for="terms">
                    J'accepte les <a href="#">conditions d'utilisation</a> et la <a href="#">politique de confidentialité</a>
                </label>
            </div>
            
            <button type="submit" class="btn-primary btn-register" id="registerBtn">
                <span class="material-icons">person_add</span>
                Créer mon compte
            </button>
            
            <div class="loading" id="loading">
                <div class="spinner"></div>
                <span>Inscription en cours...</span>
            </div>
        </form>
        
        <div class="auth-footer">
            <p>Déjà inscrit ? <a href="login.html">Se connecter</a></p>
        </div>
    </div>
</div>

<script>
const registerForm = document.getElementById('registerForm');
const registerBtn = document.getElementById('registerBtn');
const loading = document.getElementById('loading');
const successAlert = document.getElementById('successAlert');
const errorAlert = document.getElementById('errorAlert');
const errorMessage = document.getElementById('errorMessage');

registerForm.addEventListener('submit', async function(e) {
    e.preventDefault();
    
    const prenom = document.getElementById('prenom').value.trim();
    const nom = document.getElementById('nom').value.trim();
    const email = document.getElementById('email').value.trim();
    const telephone = document.getElementById('telephone').value.trim();
    const password = document.getElementById('password').value;
    const confirmPassword = document.getElementById('confirmPassword').value;
    const formation = document.getElementById('formation').value;
    const terms = document.getElementById('terms').checked;
    
    if (!prenom || !nom || !email || !telephone || !password || !confirmPassword || !formation) {
        showError('Veuillez remplir tous les champs');
        return;
    }
    
    if (password !== confirmPassword) {
        showError('Les mots de passe ne correspondent pas');
        return;
    }
    
    if (password.length < 8) {
        showError('Le mot de passe doit contenir au moins 8 caractères');
        return;
    }
    
    if (!terms) {
        showError('Veuillez accepter les conditions d\'utilisation');
        return;
    }
    
    registerBtn.disabled = true;
    loading.style.display = 'flex';
    hideAlerts();
    
    await new Promise(resolve => setTimeout(resolve, 2000));
    
    let users = JSON.parse(localStorage.getItem('innovatech_users')) || [];
    
    if (users.find(u => u.email === email)) {
        showError('Cet email est déjà utilisé');
        registerBtn.disabled = false;
        loading.style.display = 'none';
        return;
    }
    
    const newUser = {
        id: Date.now(),
        nom: `${prenom} ${nom}`,
        email,
        telephone,
        password,
        formation,
        role: 'user',
        createdAt: new Date().toISOString()
    };
    
    users.push(newUser);
    localStorage.setItem('innovatech_users', JSON.stringify(users));
    
    showSuccess();
    
    setTimeout(() => {
        window.location.href = 'login.html';
    }, 2000);
});

function showSuccess() {
    successAlert.classList.add('show');
    errorAlert.classList.remove('show');
}

function showError(message) {
    errorMessage.textContent = message;
    errorAlert.classList.add('show');
    successAlert.classList.remove('show');
}

function hideAlerts() {
    successAlert.classList.remove('show');
    errorAlert.classList.remove('show');
}

// Check if already logged in
window.addEventListener('load', function() {
    const session = JSON.parse(localStorage.getItem('innovatech_session'));
    if (session && session.user) {
        window.location.href = 'login.html';
    }
});
</script>

</body>
</html>
